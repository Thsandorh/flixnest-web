name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: 'dev'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version || 'dev' }}" >> $GITHUB_OUTPUT
            echo "tag=dev-build" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build Stremio Web
        run: pnpm run build

      - name: Update Android version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE=$(echo "$VERSION" | tr -d '.' | sed 's/^0*//')
          VERSION_CODE=${VERSION_CODE:-1}

          sed -i "s/versionCode 1/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"1.0.0\"/versionName \"$VERSION\"/" android/app/build.gradle

      - name: Setup signing keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
          echo "KEYSTORE_PATH=/tmp/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build Mobile APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleMobileRelease

      - name: Build TV APK
        working-directory: android
        run: ./gradlew assembleTvRelease

      - name: Rename APKs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mv android/app/build/outputs/apk/mobile/release/app-mobile-release.apk \
             stremio-profiles-mobile-v${VERSION}.apk
          mv android/app/build/outputs/apk/tv/release/app-tv-release.apk \
             stremio-profiles-tv-v${VERSION}.apk

      - name: Upload Mobile APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stremio-profiles-mobile-v${{ steps.version.outputs.version }}
          path: stremio-profiles-mobile-v*.apk

      - name: Upload TV APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stremio-profiles-tv-v${{ steps.version.outputs.version }}
          path: stremio-profiles-tv-v*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Stremio Profile Switcher v${{ steps.version.outputs.version }}"
          body: |
            ## Stremio Profile Switcher v${{ steps.version.outputs.version }}

            ### Downloads
            - 📱 **Mobile APK** (`stremio-profiles-mobile-v${{ steps.version.outputs.version }}.apk`) — for phones and tablets
            - 📺 **TV APK** (`stremio-profiles-tv-v${{ steps.version.outputs.version }}.apk`) — for Android TV

            ### How to install
            1. Download the appropriate APK for your device
            2. Enable "Install from unknown sources" in Android settings
            3. Install the APK
            4. On first launch, enter your server address (e.g. `http://192.168.1.100:8080`)

            ### Requirements
            - Server running on your local network (see SERVER_README.md)
            - Android 5.0 (API 21) or higher for mobile
            - Android TV for TV version
          files: |
            stremio-profiles-mobile-v${{ steps.version.outputs.version }}.apk
            stremio-profiles-tv-v${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: Hosted FlixNest URL loaded inside the Capacitor shell
        required: false
        default: https://flixnest.app

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      CAPACITOR_SERVER_URL: ${{ inputs.app_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare Capacitor web assets
        run: npm run cap:prepare

      - name: Create Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flixnest-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
